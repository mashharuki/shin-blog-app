services:
  floci:
    image: ghcr.io/hectorvent/floci:latest
    container_name: floci
    ports:
      - "4566:4566"
    environment:
      FLOCI_BASE_URL: "http://localhost:4566"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_floci/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
